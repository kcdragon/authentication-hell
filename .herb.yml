version: 0.9.7

linter:
  rules:
    a11y-no-accesskey-attribute:
      enabled: true
    a11y-no-aria-unsupported-elements:
      enabled: true
    a11y-no-autofocus-attribute:
      enabled: true
    actionview-no-silent-helper:
      enabled: true
    actionview-no-silent-render:
      enabled: true
    actionview-no-unnecessary-tag-attributes:
      enabled: true
    actionview-no-void-element-content:
      enabled: true
    actionview-strict-locals-first-line:
      enabled: true
    actionview-strict-locals-partial-only:
      enabled: true
    erb-comment-syntax:
      enabled: true
    erb-no-case-node-children:
      enabled: true
    erb-no-conditional-html-element:
      enabled: true
    erb-no-conditional-open-tag:
      enabled: true
    erb-no-debug-output:
      enabled: true
    erb-no-duplicate-branch-elements:
      enabled: false  # repeated <p> across if/else branches in totp/challenges/new — refactor then re-enable
    erb-no-empty-control-flow:
      enabled: true
    erb-no-empty-tags:
      enabled: true
    erb-no-extra-newline:
      enabled: true
    erb-no-extra-whitespace-inside-tags:
      enabled: false  # flags the stock Rails <%#= PWA boilerplate in layouts/application.html.erb
    erb-no-inline-case-conditions:
      enabled: true
    erb-no-instance-variables-in-partials:
      enabled: true
    erb-no-interpolated-class-names:
      enabled: true
    erb-no-javascript-tag-helper:
      enabled: true
    erb-no-output-control-flow:
      enabled: true
    erb-no-output-in-attribute-name:
      enabled: true
    erb-no-output-in-attribute-position:
      enabled: true
    erb-no-raw-output-in-attribute-value:
      enabled: true
    erb-no-silent-statement:
      enabled: false  # views use <% ... %> for local setup/computation (e.g. _playlist, _flash) by design
    erb-no-silent-tag-in-attribute-name:
      enabled: true
    erb-no-statement-in-script:
      enabled: true
    erb-no-then-in-control-flow:
      enabled: true
    erb-no-trailing-whitespace:
      enabled: true
    erb-no-unsafe-js-attribute:
      enabled: true
    erb-no-unsafe-raw:
      enabled: true
    erb-no-unsafe-script-interpolation:
      enabled: false  # importmap <script> interpolates digested asset_path() URLs in game/show views (safe, intentional)
    erb-no-unused-expressions:
      enabled: true
    erb-no-unused-literals:
      enabled: true
    erb-prefer-direct-output:
      enabled: true
    erb-prefer-image-tag-helper:
      enabled: true
    erb-require-trailing-newline:
      enabled: true
    erb-require-whitespace-inside-tags:
      enabled: true
    erb-right-trim:
      enabled: true
    erb-strict-locals-comment-syntax:
      enabled: true
    erb-strict-locals-required:
      enabled: true
    herb-disable-comment-malformed:
      enabled: true
    herb-disable-comment-missing-rules:
      enabled: true
    herb-disable-comment-no-duplicate-rules:
      enabled: true
    herb-disable-comment-no-redundant-all:
      enabled: true
    herb-disable-comment-unnecessary:
      enabled: true
    herb-disable-comment-valid-rule-name:
      enabled: true
    html-allowed-script-type:
      enabled: true
    html-anchor-require-href:
      enabled: true
    html-aria-attribute-must-be-valid:
      enabled: true
    html-aria-label-is-well-formatted:
      enabled: true
    html-aria-level-must-be-valid:
      enabled: true
    html-aria-role-heading-requires-level:
      enabled: true
    html-aria-role-must-be-valid:
      enabled: true
    html-attribute-double-quotes:
      enabled: true
    html-attribute-equals-spacing:
      enabled: true
    html-attribute-values-require-quotes:
      enabled: true
    html-avoid-both-disabled-and-aria-disabled:
      enabled: true
    html-body-only-elements:
      enabled: true
    html-boolean-attributes-no-value:
      enabled: true
    html-details-has-summary:
      enabled: true
    html-head-only-elements:
      enabled: true
    html-iframe-has-title:
      enabled: true
    html-img-require-alt:
      enabled: true
    html-input-require-autocomplete:
      enabled: false  # a couple inputs still lack autocomplete — revisit and re-enable
    html-navigation-has-label:
      enabled: true
    html-no-abstract-roles:
      enabled: true
    html-no-aria-hidden-on-body:
      enabled: true
    html-no-aria-hidden-on-focusable:
      enabled: true
    html-no-block-inside-inline:
      enabled: false  # one block-inside-inline case remains — revisit and re-enable
    html-no-duplicate-attributes:
      enabled: true
    html-no-duplicate-ids:
      enabled: true
    html-no-duplicate-meta-names:
      enabled: true
    html-no-empty-attributes:
      enabled: true
    html-no-empty-headings:
      enabled: true
    html-no-nested-links:
      enabled: true
    html-no-positive-tab-index:
      enabled: true
    html-no-self-closing:
      enabled: false  # self-closing void/SVG tags are used in our markup
    html-no-space-in-tag:
      enabled: false  # 103 offenses — conflicts with our multi-line opening-tag / attribute whitespace style
    html-no-title-attribute:
      enabled: false  # title: tooltips used intentionally (e.g. _playlist play links)
    html-no-underscores-in-attribute-names:
      enabled: true
    html-no-unescaped-entities:
      enabled: true
    html-no-unknown-tag:
      enabled: true
    html-require-closing-tags:
      enabled: true
    html-require-script-nonce:
      enabled: false  # app does not use CSP script nonces yet
    html-tag-name-lowercase:
      enabled: true
    parser-no-errors:
      enabled: true
    source-indentation:
      enabled: true
    svg-tag-name-capitalization:
      enabled: true
    turbo-permanent-require-id:
      enabled: true
