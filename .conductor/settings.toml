"$schema" = "https://conductor.build/schemas/settings.repo.schema.json"

[scripts]
setup = ".conductor/setup.sh && rv run bin/setup --skip-server"
run_mode = "concurrent"

[scripts.run.app]
command = "PORT=$CONDUCTOR_PORT rv run bin/dev"
default = true
icon = "flame"

[scripts.run.rubyconf]
command = "cd talks/rubyconf && { [ -d node_modules ] || npm install; } && npm run dev -- --port $CONDUCTOR_PORT"
icon = "presentation"
