# Omakase Ruby styling for Rails
inherit_gem: { rubocop-rails-omakase: rubocop.yml }

AllCops:
  # Merge these excludes with (rather than replace) the inherited defaults.
  inherit_mode:
    merge:
      - Exclude
  # Don't lint the vendored DragonRuby engine. Only game/mygame/ is ours to
  # edit; everything else under game/ is an upstream artifact (see CLAUDE.md).
  Exclude:
    - "game/builds/**/*"
    - "game/docs/**/*"
    - "game/logs/**/*"
    - "game/samples/**/*"
    - "game/tmp/**/*"
    - "game/.dragonruby/**/*"
    # repl.rb is DragonRuby's vendored console scratch file, shipped with the
    # sample game. main.rb is the only hand-written source in game/mygame/.
    - "game/mygame/app/repl.rb"
    # Slidev talk decks — not application code; any .rb here is a code snippet
    # transcluded into slides, not meant to follow the app's house style.
    - "talks/**/*"

# Overwrite or add rules to create your own house style
#
# # Use `[a, [b, c]]` not `[ a, [ b, c ] ]`
# Layout/SpaceInsideArrayLiteralBrackets:
#   Enabled: false

# Namespaced classes/modules use the compact form (`class Achievement::Awarder`),
# never nested (`class Achievement; class Awarder`). Rails-generated boilerplate
# is exempt: config/application.rb loads before autoloading (compact would raise
# `uninitialized constant`), and the rest are framework namespace stubs we don't
# own stylistically.
Style/ClassAndModuleChildren:
  Enabled: true
  EnforcedStyle: compact
  Exclude:
    - "config/application.rb"
    - "app/channels/application_cable/*.rb"
    - "test/test_helper.rb"
